<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>SpellBinding</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div id="drag-overlay" class="drag-overlay hidden">
    <div class="drag-head">Drag widget to save position</div>
    <div class="drag-controls">
      <label class="slider-row">
        <span class="slider-title">Donut Size</span>
        <div class="slider-wrap">
          <input id="drag-size-slider" type="range" min="48" max="220" step="2" />
          <span id="drag-size-label" class="slider-pill">88px</span>
        </div>
      </label>
      <label class="setting-row check"><span>Show Cooldown in Seconds</span><input id="drag-show-seconds" type="checkbox" /></label>
    </div>
    <div id="drag-widget" class="drag-widget">
      <svg viewBox="0 0 100 100">
        <circle class="track" cx="50" cy="50" r="42"></circle>
        <circle class="progress" cx="50" cy="50" r="42"></circle>
      </svg>
    </div>
  </div>

  <div class="app" id="main-app">
    <aside class="panel list-panel">
      <div class="list-head">
        <h2>Bound Weapons</h2>
        <input id="search" type="text" placeholder="Search" />
      </div>
      <div id="binding-list" class="binding-list"></div>
    </aside>

    <main class="panel main-panel">
      <header class="topbar">
        <div>
          <h1>SpellBinding</h1>
          <p class="muted" id="bind-mode">Bind Mode: Light</p>
        </div>
        <div class="top-actions">
          <button id="cooldown-edit-btn" class="icon-btn" title="Cooldown Widget">O</button>
          <button id="blacklist-btn" class="icon-btn" title="Blacklist">B</button>
          <button id="settings-btn" class="icon-btn" title="Settings">S</button>
          <button id="close-btn" class="icon-btn danger" title="Close">X</button>
        </div>
      </header>

      <section class="current-grid">
        <article class="info-card">
          <p class="label">Current Weapon</p>
          <h3 id="current-weapon">None</h3>
          <p id="current-slot" class="muted">Right Hand</p>
        </article>

        <article class="info-card">
          <div class="card-head">
            <p class="label">Current Slot Spell</p>
            <button id="current-slot-unbind" class="ghost-x" title="Unbind current slot">X</button>
          </div>
          <h3 id="current-spell">None</h3>
          <p id="current-metric" class="muted">Cost: -</p>
        </article>
      </section>

      <section class="panel inline-panel">
        <div class="inline-grid">
          <div class="spell-picker"></div>
          <div class="weapon-settings">
            <label class="slider-row">
              <span class="slider-title">Internal Cooldown</span>
              <div class="slider-wrap">
                <input id="cooldown-slider" type="range" min="0.5" max="5" step="0.5" />
                <span id="cooldown-label" class="slider-pill">1.5s</span>
              </div>
            </label>
            <label class="setting-row check"><span>Only In Combat</span><input id="only-combat" type="checkbox" /></label>
          </div>
        </div>
      </section>

      <footer class="status-grid">
        <div><span>Last Trigger</span><strong id="last-trigger">-</strong></div>
        <div><span>Mode</span><strong id="last-mode">Normal</strong></div>
        <div><span>Error</span><strong id="last-error">-</strong></div>
      </footer>
    </main>
  </div>

  <div id="settings-modal" class="modal hidden">
    <div class="modal-card">
      <div class="modal-head"><h3>Settings</h3><button id="settings-close" class="icon-btn danger">X</button></div>
      <div class="settings-grid">
        <div class="setting-row"><span>Menu Hotkey</span><button id="ui-hotkey-btn" class="small-btn">F2</button></div>
        <div class="setting-row"><span>Bind Hotkey</span><button id="bind-hotkey-btn" class="small-btn">G</button></div>
        <div class="setting-row"><span>Cycle Modifier</span><select id="modifier-select"><option value="42">Shift</option><option value="29">Ctrl</option><option value="56">Alt</option></select></div>
        <label class="setting-row check"><span>Enabled</span><input id="enabled" type="checkbox" /></label>
        <label class="setting-row check"><span>HUD Notifications</span><input id="hud-notify" type="checkbox" /></label>
        <label class="setting-row check"><span>Sound Cues</span><input id="sound-cues" type="checkbox" /></label>
        <label class="setting-row check"><span>Cooldown Donut</span><input id="hud-donut" type="checkbox" /></label>
        <label class="setting-row check"><span>Only Unsheathed</span><input id="hud-unsheathed" type="checkbox" /></label>
        <label class="setting-row check"><span>Blacklist Enabled</span><input id="blacklist-enabled" type="checkbox" /></label>
        <label class="slider-row">
          <span class="slider-title">Dedupe</span>
          <div class="slider-wrap">
            <input id="dedupe-slider" type="range" min="0.5" max="5" step="0.5" />
            <span id="dedupe-label" class="slider-pill">1.5s</span>
          </div>
        </label>
      </div>
    </div>
  </div>

  <div id="blacklist-modal" class="modal hidden">
    <div class="modal-card">
      <div class="modal-head"><h3>Blacklist</h3><button id="blacklist-close" class="icon-btn danger">X</button></div>
      <input id="blacklist-search" type="text" placeholder="Search spell" />
      <div class="blacklist-grid">
        <section>
          <h4>Blacklisted</h4>
          <div id="blacklist-list-blocked" class="spell-list"></div>
        </section>
        <section>
          <h4>Available</h4>
          <div id="blacklist-list-available" class="spell-list"></div>
        </section>
      </div>
    </div>
  </div>

  <div id="toast" class="toast"></div>
  <script src="app.js"></script>
</body>
</html>
