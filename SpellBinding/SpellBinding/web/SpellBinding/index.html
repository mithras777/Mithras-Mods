<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>SpellBinding</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div id="app" class="layout">
    <aside class="panel panel-list">
      <div class="panel-head">
        <h2>Bound Weapons</h2>
        <input id="search" class="search" type="text" placeholder="Search" />
      </div>
      <div id="binding-list" class="binding-list"></div>
    </aside>

    <main class="panel panel-current">
      <div class="title-row">
        <h1>SpellBinding</h1>
        <button id="refresh-btn" class="btn subtle">Refresh</button>
      </div>

      <section class="card hero">
        <div class="hero-left">
          <p class="eyebrow">Currently Equipped</p>
          <h3 id="current-weapon">Unknown</h3>
          <p id="current-slot" class="muted">Right hand</p>
        </div>
        <div class="hero-right">
          <p class="eyebrow">Bound Spell</p>
          <h3 id="current-spell">None</h3>
          <p id="current-cost" class="muted">Cost: -</p>
        </div>
      </section>

      <section class="card actions">
        <div>
          <p>Open <strong>Magic Menu</strong>, highlight a spell, then press <strong id="bind-hotkey">G</strong>.</p>
          <p class="muted">UI Toggle: <span id="ui-hotkey">F2</span></p>
        </div>
        <div class="action-buttons">
          <button id="bind-btn" class="btn">Bind Selected Spell</button>
          <button id="toggle-btn" class="btn subtle">Toggle UI</button>
        </div>
      </section>

      <section class="card settings">
        <label><input id="enabled" type="checkbox" /> Enabled</label>
        <label><input id="hud-notify" type="checkbox" /> HUD Notifications</label>
        <label>Power Damage Scale <input id="power-dmg" type="range" min="0.1" max="5" step="0.1" /></label>
        <label>Power Magicka Scale <input id="power-mag" type="range" min="0.1" max="5" step="0.1" /></label>
      </section>
    </main>

    <footer class="panel panel-status">
      <div><span class="label">Last Trigger</span><span id="last-trigger">-</span></div>
      <div><span class="label">Magicka Cost</span><span id="last-cost">-</span></div>
      <div><span class="label">Mode</span><span id="last-mode">Normal</span></div>
      <div><span class="label">Error</span><span id="last-error">-</span></div>
    </footer>
  </div>

  <div id="toast" class="toast"></div>
  <script src="app.js"></script>
</body>
</html>
