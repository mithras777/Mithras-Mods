<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>SpellBinding</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div class="app-shell">
    <aside class="bound-list panel">
      <div class="panel-top">
        <h2>Bound Weapons</h2>
        <input id="search" type="text" placeholder="Filter bindings..." />
      </div>
      <div id="binding-list" class="list"></div>
    </aside>

    <main class="workspace">
      <header class="topbar panel">
        <div>
          <h1>SpellBinding</h1>
          <p class="note">Dark Arcane Interface</p>
        </div>
        <div class="topbar-actions">
          <button id="refresh-btn" class="btn ghost">Refresh</button>
          <button id="toggle-btn" class="btn ghost">Toggle UI</button>
        </div>
      </header>

      <section class="preview panel">
        <article class="model-card">
          <p class="eyebrow">Weapon Model</p>
          <div class="model-stage weapon-stage">
            <div id="weapon-model-glyph" class="glyph weapon-glyph">⚔</div>
          </div>
          <h3 id="current-weapon">None</h3>
          <p id="current-slot" class="muted">Right Hand</p>
        </article>

        <article class="model-card">
          <p class="eyebrow">Spell Model</p>
          <div class="model-stage spell-stage">
            <div class="spell-core"></div>
            <div class="spell-ring"></div>
            <div id="spell-model-glyph" class="glyph spell-glyph">✦</div>
          </div>
          <h3 id="current-spell">None</h3>
          <p id="current-cost" class="muted">Cost: -</p>
        </article>
      </section>

      <section class="actions panel">
        <div class="bind-hint">
          <p>Open <strong>Magic Menu</strong>, highlight a spell, then press <strong id="bind-hotkey">G</strong>.</p>
          <p class="muted">Menu Hotkey: <span id="ui-hotkey">F2</span></p>
          <p class="muted">Concentration spells are blocked.</p>
        </div>
        <div class="action-buttons">
          <button id="bind-btn" class="btn">Bind Selected Spell</button>
        </div>
      </section>

      <section class="settings panel">
        <label><input id="enabled" type="checkbox" /> Enable SpellBinding</label>
        <label><input id="hud-notify" type="checkbox" /> Show HUD Notifications</label>
        <label>Power Damage Scale <input id="power-dmg" type="range" min="0.1" max="5" step="0.1" /></label>
        <label>Power Magicka Scale <input id="power-mag" type="range" min="0.1" max="5" step="0.1" /></label>
      </section>

      <footer class="status panel">
        <div><span class="label">Last Trigger</span><span id="last-trigger">-</span></div>
        <div><span class="label">Magicka</span><span id="last-cost">-</span></div>
        <div><span class="label">Mode</span><span id="last-mode">Normal</span></div>
        <div><span class="label">Error</span><span id="last-error">-</span></div>
      </footer>
    </main>
  </div>

  <div id="toast" class="toast"></div>
  <script src="app.js"></script>
</body>
</html>
